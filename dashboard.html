<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chatty Chop Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000810;color:#fff;font-family:'Share Tech Mono',monospace;min-height:100vh;padding:1rem}
h1{font-family:'Orbitron',monospace;color:#00f5ff;font-size:1.2rem;margin-bottom:1rem;text-align:center}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:.7rem;margin-bottom:1rem}
.card{background:rgba(0,245,255,.06);border:1px solid rgba(0,245,255,.2);padding:1rem;text-align:center}
.card .num{font-family:'Orbitron',monospace;font-size:2rem;color:#00f5ff}
.card .lbl{font-size:.55rem;color:rgba(255,255,255,.5);letter-spacing:.2em;margin-top:.3rem}
table{width:100%;border-collapse:collapse;font-size:.6rem;margin-top:1rem}
th{color:#00f5ff;padding:.4rem;border-bottom:1px solid rgba(0,245,255,.2);text-align:left}
td{padding:.35rem;border-bottom:1px solid rgba(255,255,255,.05);color:rgba(255,255,255,.8)}
tr:hover td{background:rgba(0,245,255,.04)}
.section{font-family:'Orbitron',monospace;font-size:.55rem;letter-spacing:.3em;color:rgba(0,245,255,.4);margin:1rem 0 .5rem}
#login{position:fixed;inset:0;background:#000810;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1rem;z-index:999}
#login h2{font-family:'Orbitron',monospace;color:#00f5ff}
#pinInput{background:rgba(0,245,255,.1);border:1px solid rgba(0,245,255,.3);color:#fff;font-family:'Share Tech Mono',monospace;font-size:1.5rem;padding:.5rem 1rem;text-align:center;letter-spacing:.5em;width:150px}
#loginBtn{background:rgba(0,245,255,.15);border:1px solid #00f5ff;color:#00f5ff;font-family:'Orbitron',monospace;padding:.5rem 1.5rem;cursor:pointer;font-size:.7rem}
#loginBtn:hover{background:rgba(0,245,255,.3)}
#app{display:none}
.err{color:#ff3366;font-size:.7rem;margin:.5rem 0}
.refresh{background:rgba(0,245,255,.1);border:1px solid rgba(0,245,255,.3);color:#00f5ff;font-family:'Share Tech Mono',monospace;padding:.3rem .8rem;cursor:pointer;font-size:.6rem;margin-bottom:1rem}
</style>
</head>
<body>

<div id="login">
  <h2>CHATTY CHOP DASHBOARD</h2>
  <input id="pinInput" type="password" placeholder="PIN" maxlength="4">
  <button id="loginBtn" onclick="checkPin()">ENTER</button>
  <div id="loginErr" class="err"></div>
</div>

<div id="app">
  <h1>⚡ CHATTY CHOP VISITOR DASHBOARD</h1>
  <button class="refresh" onclick="loadData()">🔄 REFRESH</button>
  <span id="updTime" style="font-size:.55rem;color:rgba(255,255,255,.3)"></span>

  <div class="grid">
    <div class="card"><div class="num" id="sTotal">—</div><div class="lbl">TOTAL VISITS</div></div>
    <div class="card"><div class="num" id="sToday">—</div><div class="lbl">TODAY</div></div>
    <div class="card"><div class="num" id="sCountries">—</div><div class="lbl">COUNTRIES</div></div>
    <div class="card"><div class="num" id="sAvg">—</div><div class="lbl">AVG SECONDS</div></div>
  </div>

  <div class="section">VISITOR LOG</div>
  <div id="status" style="font-size:.65rem;color:rgba(255,255,255,.5);margin-bottom:.5rem"></div>
  <table>
    <thead><tr><th>#</th><th>TIME</th><th>COUNTRY</th><th>CITY</th><th>DEVICE</th><th>BROWSER</th><th>SOURCE</th><th>TABS</th><th>SECS</th></tr></thead>
    <tbody id="tbody"></tbody>
  </table>

  <div class="section">❓ UNKNOWN QUESTIONS</div>
  <table>
    <thead><tr><th>TIME</th><th>QUESTION</th></tr></thead>
    <tbody id="qtbody"></tbody>
  </table>
</div>

<script>
const SHEET_ID = '1AmXlYcwPXhwr_IDrMdI4IiQ7Yv3I4aHHQi00rkVYMKA';
const PIN = '2005';

document.getElementById('pinInput').addEventListener('keydown', e => { if(e.key==='Enter') checkPin(); });

function checkPin(){
  const v = document.getElementById('pinInput').value;
  if(v === PIN){
    document.getElementById('login').style.display='none';
    document.getElementById('app').style.display='block';
    loadData();
  } else {
    document.getElementById('loginErr').textContent = 'Wrong PIN!';
  }
}

async function loadData(){
  document.getElementById('status').textContent = 'Loading...';
  try {
    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv`;
    const res = await fetch(url);
    const text = await res.text();
    
    const rows = text.trim().split('\n').map(row => {
      const cols = [];
      let cur = '', inQ = false;
      for(let c of row){
        if(c==='"') inQ=!inQ;
        else if(c===',' && !inQ){ cols.push(cur.trim()); cur=''; }
        else cur+=c;
      }
      cols.push(cur.trim());
      return cols;
    });

    if(rows.length < 2){ document.getElementById('status').textContent='No data yet'; return; }

    const headers = rows[0].map(h => h.replace(/"/g,'').toLowerCase().replace(/[^a-z]/g,''));
    const data = rows.slice(1).map(r => {
      const obj = {};
      headers.forEach((h,i) => obj[h] = (r[i]||'').replace(/^"|"$/g,''));
      return obj;
    }).filter(r => r.time || r.country);

    document.getElementById('status').textContent = `${data.length} rows loaded`;
    document.getElementById('updTime').textContent = 'Updated: ' + new Date().toLocaleTimeString();

    // Stats
    document.getElementById('sTotal').textContent = data.length;
    const today = new Date().toDateString();
    const todayCount = data.filter(r => new Date(r.time).toDateString()===today).length;
    document.getElementById('sToday').textContent = todayCount;
    const countries = new Set(data.map(r=>r.country).filter(c=>c&&c!=='Unknown'));
    document.getElementById('sCountries').textContent = countries.size;
    const withTime = data.filter(r=>parseInt(r.timespent)>0);
    const avg = withTime.length ? Math.round(withTime.reduce((s,r)=>s+parseInt(r.timespent||0),0)/withTime.length) : 0;
    document.getElementById('sAvg').textContent = avg || '—';

    // Table
    const visits = data.filter(r=>r.type!=='unknown').reverse();
    document.getElementById('tbody').innerHTML = visits.slice(0,50).map((r,i) => {
      const tabs = (r.tabsused||'').split(',').map(t=>t.trim()).filter(Boolean)
        .map(t=>`<span style="background:rgba(0,245,255,.15);border:1px solid rgba(0,245,255,.3);padding:.1rem .3rem;font-size:.5rem;color:#00f5ff">${t}</span>`).join(' ') || '—';
      return `<tr><td>${visits.length-i}</td><td>${r.time||'—'}</td><td>${r.country||'—'}</td><td>${r.city||'—'}</td><td>${r.device||'—'}</td><td>${r.browser||'—'}</td><td>${r.source||'—'}</td><td>${tabs}</td><td>${r.timespent||'0'}s</td></tr>`;
    }).join('') || '<tr><td colspan="9" style="color:rgba(255,255,255,.3);text-align:center">No visits yet</td></tr>';

    // Unknown questions
    const questions = data.filter(r=>r.type==='unknown'||(r.question&&r.question.length>0)).reverse();
    document.getElementById('qtbody').innerHTML = questions.slice(0,30).map(r =>
      `<tr><td style="color:rgba(255,255,255,.5);white-space:nowrap">${r.time||'—'}</td><td style="color:#ffcc00">${r.question||'—'}</td></tr>`
    ).join('') || '<tr><td colspan="2" style="color:rgba(255,255,255,.3);text-align:center">No unknown questions yet</td></tr>';

  } catch(e) {
    document.getElementById('status').textContent = 'Error: ' + e.message;
    console.error(e);
  }
}
</script>
</body>
</html>
